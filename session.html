<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Close Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --blk: #1A1A1A;
    --cream: #F5F0E8;
    --ora: #FF4D00;
    --mid: #8A8A8A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--blk);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 20px 40px 16px;
    border-bottom: 3px solid var(--ora);
    display: flex;
    align-items: flex-end;
    gap: 24px;
    justify-content: space-between;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .header-left { display: flex; flex-direction: column; gap: 4px; }

  .header-brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; color: var(--ora);
    text-transform: uppercase;
  }

  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 30px; font-weight: 900;
    color: var(--cream); line-height: 1;
  }

  .header-source {
    font-size: 11px; color: var(--mid);
    font-style: italic; margin-top: 3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .session-code {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; color: var(--mid);
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid #2a2a2a;
  }

  .role-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid var(--ora);
    color: var(--ora);
    display: none;
  }

  body.is-teacher .role-badge { display: block; }

  .sync-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--mid);
    padding: 6px 12px;
    border: 1px solid #2a2a2a;
  }

  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #333; transition: background 0.3s; flex-shrink: 0;
  }

  .sync-dot.connected { background: #7fd080; }
  .sync-dot.syncing   { background: var(--ora); animation: pulse 0.6s infinite alternate; }
  .sync-dot.error     { background: #e05050; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .text-panel {
    flex: 1;
    padding: 48px 56px;
    overflow-y: auto;
    border-right: 1px solid #2a2a2a;
  }

  .text-instruction {
    font-size: 10px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--mid); margin-bottom: 28px;
  }

  #textDisplay {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 700;
    color: var(--cream); line-height: 1.9;
    letter-spacing: 0.2px;
  }

  /* ── Phrases ── */
  .phrase {
    display: inline;
    padding: 2px 4px;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
  }

  .phrase:hover { background: rgba(255,255,255,0.06); }

  /* tag indicators shown as dots below each annotated phrase */
  .phrase-dots {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    vertical-align: middle;
    margin-left: 4px;
  }

  .phrase-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.85;
  }

  .phrase-dot-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    line-height: 1; color: inherit;
    opacity: 0.7;
  }

  /* Own annotation highlight */
  .phrase.own-annotation {
    background: rgba(255,255,255,0.08);
    border-bottom: 2px solid var(--mid);
  }

  /* ── Annotation popover ── */
  .popover {
    position: fixed;
    background: #141414;
    border: 1px solid #333;
    z-index: 300;
    display: none;
    flex-direction: column;
    width: 320px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  }

  .popover.show { display: flex; }

  .pop-phrase-text {
    padding: 14px 16px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--cream); line-height: 1.4;
    border-bottom: 1px solid #222;
    max-height: 80px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  .pop-section {
    padding: 12px 16px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .pop-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--mid);
  }

  .pop-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pop-tag {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    border: 1px solid #2a2a2a;
    background: #0d0d0d;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: all 0.12s;
    user-select: none;
  }

  .pop-tag .tag-dot {
    width: 7px; height: 7px;
    border-radius: 50%; flex-shrink: 0;
  }

  .pop-tag.selected { border-color: currentColor; background: rgba(255,255,255,0.05); }
  .pop-tag:not(.selected) { opacity: 0.5; }
  .pop-tag:hover { opacity: 1; }

  .pop-note {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    color: var(--cream);
    padding: 9px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    min-height: 72px;
    transition: border-color 0.15s;
    border-radius: 0;
  }

  .pop-note:focus { border-color: #555; }

  .pop-actions {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
  }

  .pop-save {
    flex: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 9px 16px;
    background: var(--ora);
    border: none;
    color: var(--blk);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .pop-save:hover { opacity: 0.85; }

  .pop-remove {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 9px 14px;
    background: none;
    border: 1px solid #2a2a2a;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }

  .pop-remove.visible { display: block; }
  .pop-remove:hover { border-color: #e07070; color: #e07070; }

  /* Teacher: student annotations in popover */
  .pop-annotations {
    max-height: 240px;
    overflow-y: auto;
    border-top: 1px solid #1e1e1e;
  }

  .pop-annotation-item {
    padding: 10px 16px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .pop-ann-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pop-ann-name {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--mid); flex: 1;
  }

  .pop-ann-tags {
    display: flex; gap: 4px; flex-wrap: wrap;
  }

  .pop-ann-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 6px;
    border: 1px solid currentColor;
    border-radius: 1px;
  }

  .pop-ann-note {
    font-size: 12px; color: #aaa;
    font-style: italic; line-height: 1.5;
    padding-left: 2px;
  }

  .pop-ann-delete {
    background: none; border: none;
    color: #444; cursor: pointer;
    font-size: 14px; line-height: 1;
    padding: 0 2px;
    transition: color 0.12s;
    flex-shrink: 0;
  }

  .pop-ann-delete:hover { color: #e07070; }

  .pop-no-ann {
    padding: 12px 16px;
    font-size: 12px; color: #333;
    font-style: italic;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .sidebar-title {
    font-size: 9px; font-weight: 700;
    letter-spacing: 3px; color: var(--mid);
    text-transform: uppercase;
    padding-bottom: 12px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* Tag summary */
  .tag-summary { display: flex; flex-direction: column; gap: 8px; }

  .tag-row {
    display: flex; align-items: center; gap: 8px;
  }

  .tag-row-dot {
    width: 8px; height: 8px;
    border-radius: 50%; flex-shrink: 0;
  }

  .tag-row-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    flex: 1;
  }

  .tag-row-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 900; line-height: 1;
  }

  /* Annotations list in sidebar */
  .ann-list { display: flex; flex-direction: column; gap: 6px; }

  .ann-card {
    background: #111;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 5px;
    border-left: 2px solid transparent;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .ann-card-phrase {
    font-size: 11px; font-style: italic;
    color: #aaa; line-height: 1.4;
  }

  .ann-card-meta {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }

  .ann-card-name {
    font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--mid);
  }

  .ann-card-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 1px 6px;
    border: 1px solid currentColor;
  }

  .ann-card-note {
    font-size: 11px; color: #888;
    font-style: italic; line-height: 1.5;
  }

  .ann-empty {
    font-size: 12px; color: #333;
    font-style: italic; padding: 4px 0;
  }

  /* Teacher controls in sidebar */
  .teacher-controls {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding-top: 8px;
    border-top: 1px solid #1a1a1a;
  }

  body.is-teacher .teacher-controls { display: flex; }

  .btn-danger {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 9px 16px;
    background: none;
    border: 1px solid #333;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .btn-danger:hover { border-color: #e07070; color: #e07070; }

  .btn-export {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 9px 16px;
    background: none;
    border: 1px solid #333;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .btn-export:hover { border-color: var(--cream); color: var(--cream); }

  /* ── Name dialog ── */
  .dialog-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
  }

  .dialog-box {
    background: #141414;
    border: 1px solid #333;
    padding: 40px;
    width: 360px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .dialog-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 900;
    color: var(--cream);
  }

  .dialog-sub {
    font-size: 13px; color: var(--mid); line-height: 1.5;
    margin-top: -10px;
  }

  .dialog-input {
    background: #0d0d0d;
    border: 1px solid #333;
    color: var(--cream);
    padding: 12px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    outline: none;
    width: 100%;
    border-radius: 0;
    transition: border-color 0.15s;
  }

  .dialog-input:focus { border-color: var(--ora); }

  .dialog-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 900;
    letter-spacing: 3px; text-transform: uppercase;
    padding: 13px 24px;
    background: var(--ora);
    border: none; color: var(--blk);
    cursor: pointer; transition: opacity 0.15s;
    align-self: flex-start;
  }

  .dialog-btn:hover { opacity: 0.85; }

  /* ── Loading / Error ── */
  .loading-screen {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }

  .loading-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--mid); letter-spacing: 3px;
    text-transform: uppercase;
  }

  .error-text {
    font-size: 14px; color: #e07070;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-brand">Close Reader</div>
    <div class="header-title" id="headerTitle">Loading...</div>
    <div class="header-source" id="headerSource"></div>
  </div>
  <div class="header-right">
    <div class="session-code" id="sessionCodeDisplay"></div>
    <div class="role-badge">Teacher</div>
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Connecting...</span>
    </div>
  </div>
</header>

<!-- Loading placeholder -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-text">Loading session...</div>
  <div class="error-text" id="errorText" style="display:none"></div>
</div>

<!-- Main content (hidden until loaded) -->
<main id="mainContent" style="display:none">
  <div class="text-panel">
    <div class="text-instruction" id="textInstruction">Click any phrase to add your annotation</div>
    <div id="textDisplay"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">Annotations</div>

    <div class="tag-summary" id="tagSummary"></div>

    <div style="border-top:1px solid #222;padding-top:16px;">
      <div class="sidebar-title" id="annListTitle">All Annotations</div>
      <div class="ann-list" id="annList" style="margin-top:12px;">
        <div class="ann-empty">No annotations yet.</div>
      </div>
    </div>

    <div class="teacher-controls">
      <button class="btn-export" onclick="exportData()">Export as JSON</button>
      <button class="btn-danger" onclick="resetAll()">Clear All Annotations</button>
    </div>
  </div>
</main>

<!-- Annotation popover -->
<div class="popover" id="popover">
  <div class="pop-phrase-text" id="popPhraseText"></div>

  <div class="pop-section" id="popTagSection">
    <div class="pop-label">Tag this phrase</div>
    <div class="pop-tags" id="popTags"></div>
  </div>

  <div class="pop-section">
    <div class="pop-label">Note <span style="font-weight:400;letter-spacing:0;text-transform:none;font-style:italic;color:#555"> — optional</span></div>
    <textarea class="pop-note" id="popNote" placeholder="What did you notice? What question does this raise?"></textarea>
  </div>

  <div class="pop-actions">
    <button class="pop-save" onclick="saveAnnotation()">Save</button>
    <button class="pop-remove" id="popRemove" onclick="removeMyAnnotation()">Remove mine</button>
  </div>

  <!-- Teacher: all student annotations -->
  <div class="pop-annotations" id="popAnnotations" style="display:none"></div>
</div>

<!-- Name dialog -->
<div class="dialog-overlay" id="nameDialog" style="display:none">
  <div class="dialog-box">
    <div class="dialog-title">What's your name?</div>
    <div class="dialog-sub">Your name will appear next to your annotations so your teacher can see your thinking.</div>
    <input class="dialog-input" id="nameInput" type="text" placeholder="First name or nickname" maxlength="40" />
    <button class="dialog-btn" onclick="submitName()">Join Session →</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCGzOSgk2wOHcZe9FU51ZbeJ6_Bq2SvyAE",
  authDomain: "close-reading-c8f7a.firebaseapp.com",
  databaseURL: "https://close-reading-c8f7a-default-rtdb.firebaseio.com",
  projectId: "close-reading-c8f7a",
  storageBucket: "close-reading-c8f7a.firebasestorage.app",
  messagingSenderId: "785542219599",
  appId: "1:785542219599:web:615b79b65ed3af1159a73a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── URL params ────────────────────────────────────────────────────────────────
const params      = new URLSearchParams(location.search);
const SESSION_ID  = (params.get('s') || '').toUpperCase();
const URL_TOKEN   = params.get('t') || '';

// ── Session state ─────────────────────────────────────────────────────────────
let sessionMeta   = null;   // { title, source, tags, teacherToken }
let phrases       = [];
let isTeacher     = false;
let annotations   = {};     // { [phraseIdx]: { [studentId]: {tags:[], note, studentName, createdAt} } }
let activePhraseIdx = null;
let selectedPopTags = new Set();

// ── Student identity ──────────────────────────────────────────────────────────
function getStudentId() {
  let id = localStorage.getItem('cr_student_id');
  if (!id) {
    id = 's' + Date.now().toString(36) + Math.random().toString(36).slice(2);
    localStorage.setItem('cr_student_id', id);
  }
  return id;
}

function getStudentName() {
  return localStorage.getItem('cr_student_name') || null;
}

function setStudentName(name) {
  localStorage.setItem('cr_student_name', name.trim());
}

const MY_ID = getStudentId();

// ── Sync indicator ────────────────────────────────────────────────────────────
function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = { connected: 'Live', syncing: 'Syncing...', error: 'Offline' }[state] || 'Connecting...';
}

db.ref('.info/connected').on('value', snap => {
  setSyncStatus(snap.val() ? 'connected' : 'error');
});

// ── Load session ──────────────────────────────────────────────────────────────
async function loadSession() {
  if (!SESSION_ID) { showError('No session ID in URL. Check your link.'); return; }

  document.getElementById('sessionCodeDisplay').textContent = 'Session ' + SESSION_ID;

  let snap;
  try {
    snap = await db.ref(`sessions/${SESSION_ID}`).once('value');
  } catch (e) {
    showError('Could not reach database: ' + e.message);
    return;
  }

  if (!snap.exists()) { showError(`Session "${SESSION_ID}" not found.`); return; }

  const data = snap.val();
  sessionMeta = data.meta;
  phrases     = data.phrases || [];

  isTeacher = URL_TOKEN && URL_TOKEN === sessionMeta.teacherToken;

  document.getElementById('headerTitle').textContent = sessionMeta.title || 'Untitled';
  document.getElementById('headerSource').textContent = sessionMeta.source || '';
  document.title = sessionMeta.title + ' — Close Reader';

  if (isTeacher) {
    document.body.classList.add('is-teacher');
    document.getElementById('textInstruction').textContent = 'Click any phrase to see all student annotations';
    document.getElementById('annListTitle').textContent = 'All Annotations';
  } else {
    document.getElementById('annListTitle').textContent = 'All Annotations';
  }

  buildTextDOM();
  buildTagSummary();

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'flex';

  // Subscribe to annotations
  db.ref(`sessions/${SESSION_ID}/annotations`).on('value', snap => {
    annotations = snap.val() || {};
    renderPhraseIndicators();
    renderSidebarAnnotations();
    setSyncStatus('connected');
  });

  // Name prompt (not teacher)
  if (!isTeacher && !getStudentName()) {
    document.getElementById('nameDialog').style.display = 'flex';
    document.getElementById('nameInput').focus();
  }
}

function showError(msg) {
  document.querySelector('.loading-text').textContent = 'Error';
  const err = document.getElementById('errorText');
  err.textContent = msg;
  err.style.display = 'block';
}

// ── Build text DOM ────────────────────────────────────────────────────────────
function buildTextDOM() {
  const display = document.getElementById('textDisplay');
  display.innerHTML = phrases.map((p, i) =>
    `<span class="phrase" id="ph${i}" onclick="openPopover(event, ${i})">${escHtml(p)}<span class="phrase-dots" id="pd${i}"></span></span> `
  ).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Tag summary in sidebar ────────────────────────────────────────────────────
function buildTagSummary() {
  const container = document.getElementById('tagSummary');
  if (!sessionMeta || !sessionMeta.tags) return;
  container.innerHTML = sessionMeta.tags.map(tag =>
    `<div class="tag-row" id="tr_${tag.id}">
      <div class="tag-row-dot" style="background:${tag.color}"></div>
      <div class="tag-row-label" style="color:${tag.color}">${tag.label}</div>
      <div class="tag-row-count" style="color:${tag.color}" id="tc_${tag.id}">0</div>
    </div>`
  ).join('');
}

function updateTagCounts() {
  if (!sessionMeta || !sessionMeta.tags) return;
  const counts = {};
  sessionMeta.tags.forEach(t => { counts[t.id] = 0; });

  Object.values(annotations).forEach(phraseAnns => {
    Object.values(phraseAnns).forEach(ann => {
      (ann.tags || []).forEach(tid => {
        if (counts[tid] !== undefined) counts[tid]++;
      });
    });
  });

  sessionMeta.tags.forEach(tag => {
    const el = document.getElementById('tc_' + tag.id);
    if (el) el.textContent = counts[tag.id] || 0;
  });
}

// ── Render phrase indicators (dots) ──────────────────────────────────────────
function renderPhraseIndicators() {
  phrases.forEach((_, i) => {
    const dotContainer = document.getElementById('pd' + i);
    const phraseEl     = document.getElementById('ph' + i);
    if (!dotContainer || !phraseEl) return;

    const phraseAnns = annotations[i] || {};
    const tagCounts  = {};

    Object.values(phraseAnns).forEach(ann => {
      (ann.tags || []).forEach(tid => {
        tagCounts[tid] = (tagCounts[tid] || 0) + 1;
      });
    });

    const hasOwn = !!phraseAnns[MY_ID];
    phraseEl.classList.toggle('own-annotation', hasOwn);

    if (Object.keys(tagCounts).length === 0) {
      dotContainer.innerHTML = '';
      return;
    }

    const tagMap = {};
    (sessionMeta.tags || []).forEach(t => { tagMap[t.id] = t; });

    dotContainer.innerHTML = Object.entries(tagCounts).map(([tid, cnt]) => {
      const tag = tagMap[tid];
      if (!tag) return '';
      return `<span class="phrase-dot" style="background:${tag.color}" title="${tag.label}: ${cnt}"></span>`;
    }).join('');
  });

  updateTagCounts();
}

// ── Render sidebar annotation list ────────────────────────────────────────────
function renderSidebarAnnotations() {
  const list = document.getElementById('annList');
  const tagMap = {};
  (sessionMeta.tags || []).forEach(t => { tagMap[t.id] = t; });

  const allAnns = [];

  Object.entries(annotations).forEach(([phraseIdx, phraseAnns]) => {
    Object.entries(phraseAnns).forEach(([studentId, ann]) => {
      allAnns.push({ phraseIdx: parseInt(phraseIdx), studentId, ...ann });
    });
  });

  // Sort newest first
  allAnns.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  if (!allAnns.length) {
    list.innerHTML = '<div class="ann-empty">No annotations yet.</div>';
    return;
  }

  list.innerHTML = allAnns.map(ann => {
    const phraseText = phrases[ann.phraseIdx] || '';
    const tagChips = (ann.tags || []).map(tid => {
      const tag = tagMap[tid];
      if (!tag) return '';
      return `<span class="ann-card-tag" style="color:${tag.color}">${tag.label}</span>`;
    }).join('');
    const borderColor = ann.tags && ann.tags[0] && tagMap[ann.tags[0]]
      ? tagMap[ann.tags[0]].color : '#444';

    return `<div class="ann-card" style="border-left-color:${borderColor}">
      <div class="ann-card-phrase">"${escHtml(phraseText.slice(0, 80))}${phraseText.length > 80 ? '…' : ''}"</div>
      <div class="ann-card-meta">
        <span class="ann-card-name">${escHtml(ann.studentName || 'Anonymous')}</span>
        ${tagChips}
      </div>
      ${ann.note ? `<div class="ann-card-note">${escHtml(ann.note)}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Annotation popover ────────────────────────────────────────────────────────
function openPopover(e, idx) {
  e.stopPropagation();
  activePhraseIdx = idx;
  selectedPopTags = new Set();

  const pop = document.getElementById('popover');

  // Load own existing annotation
  const myAnn = (annotations[idx] || {})[MY_ID];
  if (myAnn) {
    selectedPopTags = new Set(myAnn.tags || []);
    document.getElementById('popNote').value = myAnn.note || '';
  } else {
    document.getElementById('popNote').value = '';
  }

  document.getElementById('popPhraseText').textContent = phrases[idx] || '';
  document.getElementById('popRemove').classList.toggle('visible', !!myAnn);

  // Render tags
  renderPopTags();

  // Teacher: show all student annotations
  const annSection = document.getElementById('popAnnotations');
  if (isTeacher) {
    annSection.style.display = 'block';
    renderPopAnnotations(idx);
  } else {
    annSection.style.display = 'none';
  }

  // For teacher in read mode, hide the tag/note input section
  const tagSection = document.getElementById('popTagSection');
  if (isTeacher) {
    tagSection.style.display = 'none';
    document.querySelector('.pop-section:last-of-type').style.display = 'none';
    document.querySelector('.pop-actions').style.display = 'none';
  } else {
    tagSection.style.display = 'flex';
    document.querySelector('.pop-section:last-of-type').style.display = 'flex';
    document.querySelector('.pop-actions').style.display = 'flex';
  }

  // Position popover
  const rect = document.getElementById('ph' + idx).getBoundingClientRect();
  const popW = 320;
  let left = e.clientX;
  let top  = rect.bottom + 8;

  if (left + popW > window.innerWidth - 16) left = window.innerWidth - popW - 16;
  if (top + 400 > window.innerHeight) top = rect.top - Math.min(400, rect.top - 16);

  pop.style.left = left + 'px';
  pop.style.top  = top + 'px';
  pop.classList.add('show');
}

function renderPopTags() {
  const container = document.getElementById('popTags');
  const tags = (sessionMeta && sessionMeta.tags) || [];
  container.innerHTML = tags.map(tag =>
    `<div class="pop-tag ${selectedPopTags.has(tag.id) ? 'selected' : ''}"
       style="color:${tag.color}"
       onclick="togglePopTag('${tag.id}')">
      <span class="tag-dot" style="background:${tag.color}"></span>
      ${tag.label}
    </div>`
  ).join('');
}

function togglePopTag(id) {
  if (selectedPopTags.has(id)) {
    selectedPopTags.delete(id);
  } else {
    selectedPopTags.add(id);
  }
  renderPopTags();
}

function renderPopAnnotations(idx) {
  const container = document.getElementById('popAnnotations');
  const phraseAnns = annotations[idx] || {};
  const tagMap = {};
  (sessionMeta.tags || []).forEach(t => { tagMap[t.id] = t; });

  const items = Object.entries(phraseAnns);
  if (!items.length) {
    container.innerHTML = '<div class="pop-no-ann">No annotations for this phrase yet.</div>';
    return;
  }

  container.innerHTML = items.map(([studentId, ann]) => {
    const tagChips = (ann.tags || []).map(tid => {
      const tag = tagMap[tid];
      if (!tag) return '';
      return `<span class="pop-ann-tag" style="color:${tag.color}">${tag.label}</span>`;
    }).join('');

    return `<div class="pop-annotation-item">
      <div class="pop-ann-header">
        <div class="pop-ann-name">${escHtml(ann.studentName || 'Anonymous')}</div>
        <div class="pop-ann-tags">${tagChips}</div>
        <button class="pop-ann-delete" title="Delete" onclick="deleteAnnotation(${idx}, '${studentId}')">×</button>
      </div>
      ${ann.note ? `<div class="pop-ann-note">${escHtml(ann.note)}</div>` : ''}
    </div>`;
  }).join('');
}

function closePopover() {
  document.getElementById('popover').classList.remove('show');
  activePhraseIdx = null;
}

document.addEventListener('click', e => {
  if (!document.getElementById('popover').contains(e.target)) closePopover();
});

// ── Save / Remove annotation ──────────────────────────────────────────────────
function saveAnnotation() {
  if (activePhraseIdx === null) return;
  if (!selectedPopTags.size) { alert('Pick at least one tag.'); return; }

  const name = getStudentName();
  if (!name) { alert('Please enter your name first.'); return; }

  setSyncStatus('syncing');
  const annotation = {
    tags: Array.from(selectedPopTags),
    note: document.getElementById('popNote').value.trim(),
    studentName: name,
    studentId: MY_ID,
    createdAt: Date.now()
  };

  db.ref(`sessions/${SESSION_ID}/annotations/${activePhraseIdx}/${MY_ID}`)
    .set(annotation)
    .then(() => setSyncStatus('connected'))
    .catch(e => { setSyncStatus('error'); console.error(e); });

  closePopover();
}

function removeMyAnnotation() {
  if (activePhraseIdx === null) return;
  setSyncStatus('syncing');
  db.ref(`sessions/${SESSION_ID}/annotations/${activePhraseIdx}/${MY_ID}`)
    .remove()
    .then(() => setSyncStatus('connected'));
  closePopover();
}

function deleteAnnotation(phraseIdx, studentId) {
  if (!isTeacher) return;
  setSyncStatus('syncing');
  db.ref(`sessions/${SESSION_ID}/annotations/${phraseIdx}/${studentId}`)
    .remove()
    .then(() => setSyncStatus('connected'));
  renderPopAnnotations(phraseIdx);
}

// ── Teacher controls ──────────────────────────────────────────────────────────
function resetAll() {
  if (!isTeacher) return;
  if (!confirm('Delete all annotations? This cannot be undone.')) return;
  setSyncStatus('syncing');
  db.ref(`sessions/${SESSION_ID}/annotations`).remove()
    .then(() => setSyncStatus('connected'));
}

function exportData() {
  if (!isTeacher) return;
  const tagMap = {};
  (sessionMeta.tags || []).forEach(t => { tagMap[t.id] = t.label; });

  const rows = [];
  Object.entries(annotations).forEach(([phraseIdx, phraseAnns]) => {
    const phraseText = phrases[parseInt(phraseIdx)] || '';
    Object.entries(phraseAnns).forEach(([studentId, ann]) => {
      rows.push({
        phrase: phraseText,
        student: ann.studentName || 'Anonymous',
        tags: (ann.tags || []).map(tid => tagMap[tid] || tid).join(', '),
        note: ann.note || '',
        time: ann.createdAt ? new Date(ann.createdAt).toISOString() : ''
      });
    });
  });

  const blob = new Blob([JSON.stringify({ session: sessionMeta, annotations: rows }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `close-reader-${SESSION_ID}.json`;
  a.click();
}

// ── Name dialog ───────────────────────────────────────────────────────────────
function submitName() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  setStudentName(val);
  document.getElementById('nameDialog').style.display = 'none';
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadSession();
</script>
