<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Close Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap');

  :root {
    --bg:     #FFFFFF;
    --surface:#F3F3F0;
    --ink:    #111111;
    --mid:    #6B6B68;
    --faint:  #E6E6E2;
    --border: #CECECA;
    --red:    #CC1100;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { border-top: 3px solid var(--red); }

  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ─────────────────────────────────────────────────────────────── */
  header {
    padding: 20px 40px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .header-left { display: flex; flex-direction: column; gap: 3px; }

  .header-wordmark {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mid);
  }

  .header-title {
    font-size: 26px; font-weight: 800;
    color: var(--ink); line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .header-source {
    font-size: 12px; color: var(--mid);
    font-style: italic; margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  .session-code {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mid);
    padding: 6px 12px;
    border: 1px solid var(--border);
  }

  .role-badge {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid var(--red);
    color: var(--red);
    display: none;
  }

  body.is-teacher .role-badge { display: block; }

  .sync-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--mid);
    padding: 6px 12px;
    border: 1px solid var(--border);
  }

  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border); transition: background 0.3s; flex-shrink: 0;
  }

  .sync-dot.connected { background: #16A34A; }
  .sync-dot.syncing   { background: var(--red); animation: pulse 0.7s infinite alternate; }
  .sync-dot.error     { background: #DC2626; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.2; } }

  /* ── Main layout ─────────────────────────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* ── Text panel ──────────────────────────────────────────────────────────── */
  .text-panel {
    flex: 1;
    padding: 52px 64px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .text-instruction {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--border);
  }

  #textDisplay {
    font-size: 21px; font-weight: 400;
    color: var(--ink); line-height: 1.9;
    letter-spacing: -0.005em;
    max-width: 640px;
  }

  /* ── Phrases ─────────────────────────────────────────────────────────────── */
  .phrase {
    display: inline;
    padding: 1px 2px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: background 0.1s, border-color 0.1s;
  }

  .phrase:hover { background: var(--surface); border-bottom-color: var(--border); }

  .phrase.own-annotation {
    border-bottom: 2px solid var(--ink);
    background: var(--surface);
  }

  .phrase-dots {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    vertical-align: middle;
    margin-left: 5px;
    margin-right: 1px;
  }

  .phrase-dot {
    width: 6px; height: 6px;
    border-radius: 50%; flex-shrink: 0;
  }

  /* ── Annotation popover ──────────────────────────────────────────────────── */
  .popover {
    position: fixed;
    background: var(--bg);
    border: 1px solid var(--border);
    z-index: 300;
    display: none;
    flex-direction: column;
    width: 300px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  }

  .popover.show { display: flex; }

  .pop-phrase-text {
    padding: 14px 16px 12px;
    font-size: 14px; font-weight: 500;
    color: var(--ink); line-height: 1.5;
    border-bottom: 1px solid var(--faint);
    max-height: 80px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    font-style: italic;
  }

  .pop-section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--faint);
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .pop-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--mid);
  }

  .pop-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .pop-tag {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink);
    transition: all 0.1s;
    user-select: none;
  }

  .tag-dot {
    width: 6px; height: 6px;
    border-radius: 50%; flex-shrink: 0;
  }

  .pop-tag.selected { background: var(--surface); border-color: var(--ink); }
  .pop-tag:not(.selected) { opacity: 0.4; }
  .pop-tag:hover { opacity: 1; }

  .pop-note {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--faint);
    color: var(--ink);
    padding: 9px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    min-height: 72px;
    transition: border-color 0.12s;
    border-radius: 0;
    -webkit-font-smoothing: antialiased;
  }

  .pop-note:focus { border-color: var(--border); }
  .pop-note::placeholder { color: var(--border); }

  .pop-actions {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
  }

  .pop-save {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 16px;
    background: var(--ink);
    border: none;
    color: #FFFFFF;
    cursor: pointer;
    transition: opacity 0.12s;
  }

  .pop-save:hover { opacity: 0.7; }

  .pop-remove {
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 12px;
    background: none;
    border: 1px solid var(--faint);
    color: var(--mid);
    cursor: pointer;
    transition: all 0.12s;
    display: none;
  }

  .pop-remove.visible { display: block; }
  .pop-remove:hover { border-color: #DC2626; color: #DC2626; }

  /* Teacher: student annotations in popover */
  .pop-annotations {
    max-height: 260px;
    overflow-y: auto;
    border-top: 1px solid var(--faint);
  }

  .pop-ann-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--faint);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .pop-ann-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pop-ann-name {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--mid); flex: 1;
  }

  .pop-ann-tags { display: flex; gap: 4px; flex-wrap: wrap; }

  .pop-ann-tag {
    font-size: 8px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 6px;
    border: 1px solid currentColor;
  }

  .pop-ann-note {
    font-size: 12px; color: var(--mid);
    font-style: italic; line-height: 1.5;
  }

  .pop-ann-delete {
    background: none; border: none;
    color: var(--border); cursor: pointer;
    font-size: 16px; line-height: 1;
    padding: 0 2px;
    transition: color 0.12s;
    flex-shrink: 0;
  }

  .pop-ann-delete:hover { color: #DC2626; }

  .pop-no-ann {
    padding: 14px 16px;
    font-size: 12px; color: var(--border);
    font-style: italic;
  }

  /* ── Sidebar ─────────────────────────────────────────────────────────────── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding-bottom: 28px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--faint);
  }

  .sidebar-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .sidebar-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--mid); margin-bottom: 20px;
  }

  /* Tag count rows — Swiss poster style: big number, small label */
  .tag-stat {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 4px 0;
  }

  .tag-stat-count {
    font-size: 28px; font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    min-width: 44px;
    font-variant-numeric: tabular-nums;
  }

  .tag-stat-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* Annotation feed */
  .ann-feed { display: flex; flex-direction: column; gap: 8px; }

  .ann-card {
    background: var(--bg);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 5px;
    border-left: 2px solid transparent;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ann-card { animation: fadeUp 0.2s ease; }

  .ann-card-quote {
    font-size: 11px; font-style: italic;
    color: var(--mid); line-height: 1.5;
  }

  .ann-card-meta {
    display: flex; align-items: center;
    gap: 6px; flex-wrap: wrap;
  }

  .ann-card-name {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--mid);
  }

  .ann-card-tag {
    font-size: 8px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 1px 5px;
    border: 1px solid currentColor;
  }

  .ann-card-note {
    font-size: 11px; color: var(--mid);
    font-style: italic; line-height: 1.5;
  }

  .ann-empty {
    font-size: 12px; color: var(--border);
    font-style: italic;
  }

  /* Teacher controls */
  .teacher-controls {
    display: none;
    flex-direction: column;
    gap: 6px;
  }

  body.is-teacher .teacher-controls { display: flex; }

  .btn-ctrl {
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 14px;
    background: none;
    border: 1px solid var(--border);
    color: var(--mid);
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
  }

  .btn-ctrl:hover { border-color: var(--ink); color: var(--ink); }
  .btn-ctrl.danger:hover { border-color: #DC2626; color: #DC2626; }

  /* ── Name dialog ─────────────────────────────────────────────────────────── */
  .dialog-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
  }

  .dialog-box {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 48px;
    width: 380px;
    display: flex; flex-direction: column; gap: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  }

  .dialog-eyebrow {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mid);
  }

  .dialog-title {
    font-size: 28px; font-weight: 800;
    color: var(--ink); letter-spacing: -0.02em;
    line-height: 1.1; margin-top: -4px;
  }

  .dialog-sub {
    font-size: 13px; color: var(--mid);
    line-height: 1.6; margin-top: -4px;
  }

  .dialog-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    outline: none;
    width: 100%;
    border-radius: 0;
    transition: border-color 0.12s;
    -webkit-font-smoothing: antialiased;
  }

  .dialog-input:focus { border-color: var(--red); }

  .dialog-btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 13px 28px;
    background: var(--ink);
    border: none; color: #FFFFFF;
    cursor: pointer; transition: opacity 0.15s;
    align-self: flex-start;
  }

  .dialog-btn:hover { opacity: 0.7; }

  /* ── Loading / error ─────────────────────────────────────────────────────── */
  .loading-screen {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }

  .loading-text {
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--border);
  }

  .error-text {
    font-size: 13px; color: #DC2626;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-wordmark">Close Reader</div>
    <div class="header-title" id="headerTitle">Loading…</div>
    <div class="header-source" id="headerSource"></div>
  </div>
  <div class="header-right">
    <div class="session-code" id="sessionCodeDisplay"></div>
    <div class="role-badge">Teacher</div>
    <div class="sync-pill">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Connecting</span>
    </div>
  </div>
</header>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-text">Loading session…</div>
  <div class="error-text" id="errorText" style="display:none"></div>
</div>

<main id="mainContent" style="display:none">
  <div class="text-panel">
    <div class="text-instruction" id="textInstruction">Click any phrase to annotate</div>
    <div id="textDisplay"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Tags</div>
      <div id="tagSummary"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label" id="annListTitle">Annotations</div>
      <div class="ann-feed" id="annList">
        <div class="ann-empty">None yet.</div>
      </div>
    </div>

    <div class="sidebar-section teacher-controls">
      <div class="sidebar-label">Controls</div>
      <button class="btn-ctrl" onclick="exportData()">Export as JSON</button>
      <button class="btn-ctrl danger" onclick="resetAll()">Clear All Annotations</button>
    </div>
  </div>
</main>

<!-- Annotation popover -->
<div class="popover" id="popover">
  <div class="pop-phrase-text" id="popPhraseText"></div>

  <div class="pop-section" id="popTagSection">
    <div class="pop-label">Tag</div>
    <div class="pop-tags" id="popTags"></div>
  </div>

  <div class="pop-section" id="popNoteSection">
    <div class="pop-label">Note <span style="font-weight:400;letter-spacing:0;text-transform:none;font-style:italic;color:var(--border)"> — optional</span></div>
    <textarea class="pop-note" id="popNote" placeholder="What did you notice?"></textarea>
  </div>

  <div class="pop-actions" id="popActions">
    <button class="pop-save" onclick="saveAnnotation()">Save</button>
    <button class="pop-remove" id="popRemove" onclick="removeMyAnnotation()">Remove</button>
  </div>

  <div class="pop-annotations" id="popAnnotations" style="display:none"></div>
</div>

<!-- Name dialog -->
<div class="dialog-overlay" id="nameDialog" style="display:none">
  <div class="dialog-box">
    <div class="dialog-eyebrow">Close Reader</div>
    <div class="dialog-title">What's your name?</div>
    <div class="dialog-sub">Your name appears next to your annotations so your teacher can follow your thinking.</div>
    <input class="dialog-input" id="nameInput" type="text" placeholder="First name or nickname" maxlength="40" />
    <button class="dialog-btn" onclick="submitName()">Join →</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCGzOSgk2wOHcZe9FU51ZbeJ6_Bq2SvyAE",
  authDomain: "close-reading-c8f7a.firebaseapp.com",
  databaseURL: "https://close-reading-c8f7a-default-rtdb.firebaseio.com",
  projectId: "close-reading-c8f7a",
  storageBucket: "close-reading-c8f7a.firebasestorage.app",
  messagingSenderId: "785542219599",
  appId: "1:785542219599:web:615b79b65ed3af1159a73a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params     = new URLSearchParams(location.search);
const SESSION_ID = (params.get('s') || '').toUpperCase();
const URL_TOKEN  = params.get('t') || '';

let sessionMeta   = null;
let phrases       = [];
let isTeacher     = false;
let annotations   = {};
let activePhraseIdx = null;
let selectedPopTags = new Set();

function getStudentId() {
  let id = localStorage.getItem('cr_student_id');
  if (!id) {
    id = 's' + Date.now().toString(36) + Math.random().toString(36).slice(2);
    localStorage.setItem('cr_student_id', id);
  }
  return id;
}

function getStudentName() { return localStorage.getItem('cr_student_name') || null; }
function setStudentName(name) { localStorage.setItem('cr_student_name', name.trim()); }

const MY_ID = getStudentId();

function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = { connected: 'Live', syncing: 'Syncing', error: 'Offline' }[state] || 'Connecting';
}

db.ref('.info/connected').on('value', snap => {
  setSyncStatus(snap.val() ? 'connected' : 'error');
});

// ── Load session ──────────────────────────────────────────────────────────────
async function loadSession() {
  if (!SESSION_ID) { showError('No session ID in URL.'); return; }

  document.getElementById('sessionCodeDisplay').textContent = SESSION_ID;

  let snap;
  try {
    snap = await db.ref(`sessions/${SESSION_ID}`).once('value');
  } catch (e) {
    showError('Could not reach database: ' + e.message);
    return;
  }

  if (!snap.exists()) { showError(`Session "${SESSION_ID}" not found.`); return; }

  const data  = snap.val();
  sessionMeta = data.meta;
  phrases     = data.phrases || [];
  isTeacher   = URL_TOKEN && URL_TOKEN === sessionMeta.teacherToken;

  document.getElementById('headerTitle').textContent  = sessionMeta.title  || 'Untitled';
  document.getElementById('headerSource').textContent = sessionMeta.source || '';
  document.title = sessionMeta.title + ' — Close Reader';

  if (isTeacher) {
    document.body.classList.add('is-teacher');
    document.getElementById('textInstruction').textContent = 'Click any phrase to see student annotations';
  }

  buildTextDOM();
  buildTagSummary();

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display  = 'flex';

  db.ref(`sessions/${SESSION_ID}/annotations`).on('value', snap => {
    annotations = snap.val() || {};
    renderPhraseIndicators();
    renderSidebarAnnotations();
    setSyncStatus('connected');
  });

  if (!isTeacher && !getStudentName()) {
    document.getElementById('nameDialog').style.display = 'flex';
    setTimeout(() => document.getElementById('nameInput').focus(), 50);
  }
}

function showError(msg) {
  document.querySelector('.loading-text').textContent = 'Error';
  const err = document.getElementById('errorText');
  err.textContent = msg;
  err.style.display = 'block';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Build text DOM ────────────────────────────────────────────────────────────
function buildTextDOM() {
  document.getElementById('textDisplay').innerHTML = phrases.map((p, i) =>
    `<span class="phrase" id="ph${i}" onclick="openPopover(event,${i})">${escHtml(p)}<span class="phrase-dots" id="pd${i}"></span></span> `
  ).join('');
}

// ── Tag summary — big numbers ─────────────────────────────────────────────────
function buildTagSummary() {
  const container = document.getElementById('tagSummary');
  if (!sessionMeta || !sessionMeta.tags) return;
  container.innerHTML = sessionMeta.tags.map(tag =>
    `<div class="tag-stat">
      <div class="tag-stat-count" style="color:${tag.color}" id="tc_${tag.id}">0</div>
      <div class="tag-stat-label" style="color:${tag.color}">${tag.label}</div>
    </div>`
  ).join('');
}

function updateTagCounts() {
  if (!sessionMeta || !sessionMeta.tags) return;
  const counts = {};
  sessionMeta.tags.forEach(t => { counts[t.id] = 0; });
  Object.values(annotations).forEach(phraseAnns => {
    Object.values(phraseAnns).forEach(ann => {
      (ann.tags || []).forEach(tid => { if (counts[tid] !== undefined) counts[tid]++; });
    });
  });
  sessionMeta.tags.forEach(tag => {
    const el = document.getElementById('tc_' + tag.id);
    if (el) el.textContent = counts[tag.id] || 0;
  });
}

// ── Phrase dot indicators ─────────────────────────────────────────────────────
function renderPhraseIndicators() {
  const tagMap = {};
  (sessionMeta.tags || []).forEach(t => { tagMap[t.id] = t; });

  phrases.forEach((_, i) => {
    const dots    = document.getElementById('pd' + i);
    const phraseEl= document.getElementById('ph' + i);
    if (!dots || !phraseEl) return;

    const phraseAnns = annotations[i] || {};
    const tagCounts  = {};
    Object.values(phraseAnns).forEach(ann => {
      (ann.tags || []).forEach(tid => { tagCounts[tid] = (tagCounts[tid] || 0) + 1; });
    });

    phraseEl.classList.toggle('own-annotation', !!phraseAnns[MY_ID]);

    if (!Object.keys(tagCounts).length) { dots.innerHTML = ''; return; }

    dots.innerHTML = Object.entries(tagCounts).map(([tid]) => {
      const tag = tagMap[tid];
      return tag ? `<span class="phrase-dot" style="background:${tag.color}" title="${tag.label}"></span>` : '';
    }).join('');
  });

  updateTagCounts();
}

// ── Sidebar annotation list ───────────────────────────────────────────────────
function renderSidebarAnnotations() {
  const list   = document.getElementById('annList');
  const tagMap = {};
  (sessionMeta.tags || []).forEach(t => { tagMap[t.id] = t; });

  const allAnns = [];
  Object.entries(annotations).forEach(([pIdx, phraseAnns]) => {
    Object.entries(phraseAnns).forEach(([sid, ann]) => {
      allAnns.push({ phraseIdx: parseInt(pIdx), studentId: sid, ...ann });
    });
  });
  allAnns.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  if (!allAnns.length) {
    list.innerHTML = '<div class="ann-empty">None yet.</div>';
    return;
  }

  list.innerHTML = allAnns.map(ann => {
    const text = phrases[ann.phraseIdx] || '';
    const tags = (ann.tags || []).map(tid => {
      const tag = tagMap[tid];
      return tag ? `<span class="ann-card-tag" style="color:${tag.color}">${tag.label}</span>` : '';
    }).join('');
    const borderColor = ann.tags && ann.tags[0] && tagMap[ann.tags[0]]
      ? tagMap[ann.tags[0]].color : 'transparent';
    return `<div class="ann-card" style="border-left-color:${borderColor}">
      <div class="ann-card-quote">"${escHtml(text.slice(0,70))}${text.length>70?'…':''}"</div>
      <div class="ann-card-meta">
        <span class="ann-card-name">${escHtml(ann.studentName||'Anonymous')}</span>
        ${tags}
      </div>
      ${ann.note ? `<div class="ann-card-note">${escHtml(ann.note)}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Annotation popover ────────────────────────────────────────────────────────
function openPopover(e, idx) {
  e.stopPropagation();
  activePhraseIdx = idx;
  selectedPopTags = new Set();

  const myAnn = (annotations[idx] || {})[MY_ID];
  if (myAnn) {
    selectedPopTags = new Set(myAnn.tags || []);
    document.getElementById('popNote').value = myAnn.note || '';
  } else {
    document.getElementById('popNote').value = '';
  }

  document.getElementById('popPhraseText').textContent = phrases[idx] || '';
  document.getElementById('popRemove').classList.toggle('visible', !!myAnn);

  renderPopTags();

  const annSection = document.getElementById('popAnnotations');
  if (isTeacher) {
    annSection.style.display = 'block';
    renderPopAnnotations(idx);
    document.getElementById('popTagSection').style.display  = 'none';
    document.getElementById('popNoteSection').style.display = 'none';
    document.getElementById('popActions').style.display     = 'none';
  } else {
    annSection.style.display = 'none';
    document.getElementById('popTagSection').style.display  = 'flex';
    document.getElementById('popNoteSection').style.display = 'flex';
    document.getElementById('popActions').style.display     = 'flex';
  }

  const pop  = document.getElementById('popover');
  const rect = document.getElementById('ph' + idx).getBoundingClientRect();
  const popW = 300;
  let left = e.clientX;
  let top  = rect.bottom + 8;
  if (left + popW > window.innerWidth - 16) left = window.innerWidth - popW - 16;
  if (top + 420 > window.innerHeight) top = Math.max(8, rect.top - 420);
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
  pop.classList.add('show');
}

function renderPopTags() {
  const tags = (sessionMeta && sessionMeta.tags) || [];
  document.getElementById('popTags').innerHTML = tags.map(tag =>
    `<div class="pop-tag ${selectedPopTags.has(tag.id) ? 'selected' : ''}"
       onclick="togglePopTag('${tag.id}')">
      <span class="tag-dot" style="background:${tag.color}"></span>
      ${tag.label}
    </div>`
  ).join('');
}

function togglePopTag(id) {
  selectedPopTags.has(id) ? selectedPopTags.delete(id) : selectedPopTags.add(id);
  renderPopTags();
}

function renderPopAnnotations(idx) {
  const container  = document.getElementById('popAnnotations');
  const phraseAnns = annotations[idx] || {};
  const tagMap = {};
  (sessionMeta.tags || []).forEach(t => { tagMap[t.id] = t; });

  const items = Object.entries(phraseAnns);
  if (!items.length) {
    container.innerHTML = '<div class="pop-no-ann">No annotations yet.</div>';
    return;
  }

  container.innerHTML = items.map(([sid, ann]) => {
    const tags = (ann.tags || []).map(tid => {
      const tag = tagMap[tid];
      return tag ? `<span class="pop-ann-tag" style="color:${tag.color}">${tag.label}</span>` : '';
    }).join('');
    return `<div class="pop-ann-item">
      <div class="pop-ann-header">
        <div class="pop-ann-name">${escHtml(ann.studentName||'Anonymous')}</div>
        <div class="pop-ann-tags">${tags}</div>
        <button class="pop-ann-delete" title="Delete" onclick="deleteAnnotation(${idx},'${sid}')">×</button>
      </div>
      ${ann.note ? `<div class="pop-ann-note">${escHtml(ann.note)}</div>` : ''}
    </div>`;
  }).join('');
}

function closePopover() {
  document.getElementById('popover').classList.remove('show');
  activePhraseIdx = null;
}

document.addEventListener('click', e => {
  if (!document.getElementById('popover').contains(e.target)) closePopover();
});

// ── Save / remove annotation ──────────────────────────────────────────────────
function saveAnnotation() {
  if (activePhraseIdx === null) return;
  if (!selectedPopTags.size) { alert('Pick at least one tag.'); return; }
  const name = getStudentName();
  if (!name) { alert('Please enter your name first.'); return; }

  setSyncStatus('syncing');
  db.ref(`sessions/${SESSION_ID}/annotations/${activePhraseIdx}/${MY_ID}`)
    .set({
      tags: Array.from(selectedPopTags),
      note: document.getElementById('popNote').value.trim(),
      studentName: name,
      studentId: MY_ID,
      createdAt: Date.now()
    })
    .then(() => setSyncStatus('connected'))
    .catch(e => { setSyncStatus('error'); console.error(e); });

  closePopover();
}

function removeMyAnnotation() {
  if (activePhraseIdx === null) return;
  setSyncStatus('syncing');
  db.ref(`sessions/${SESSION_ID}/annotations/${activePhraseIdx}/${MY_ID}`)
    .remove().then(() => setSyncStatus('connected'));
  closePopover();
}

function deleteAnnotation(phraseIdx, studentId) {
  if (!isTeacher) return;
  setSyncStatus('syncing');
  db.ref(`sessions/${SESSION_ID}/annotations/${phraseIdx}/${studentId}`)
    .remove().then(() => setSyncStatus('connected'));
  renderPopAnnotations(phraseIdx);
}

// ── Teacher controls ──────────────────────────────────────────────────────────
function resetAll() {
  if (!isTeacher) return;
  if (!confirm('Delete all annotations? This cannot be undone.')) return;
  setSyncStatus('syncing');
  db.ref(`sessions/${SESSION_ID}/annotations`).remove()
    .then(() => setSyncStatus('connected'));
}

function exportData() {
  if (!isTeacher) return;
  const tagMap = {};
  (sessionMeta.tags || []).forEach(t => { tagMap[t.id] = t.label; });
  const rows = [];
  Object.entries(annotations).forEach(([pIdx, phraseAnns]) => {
    const phraseText = phrases[parseInt(pIdx)] || '';
    Object.entries(phraseAnns).forEach(([, ann]) => {
      rows.push({
        phrase: phraseText,
        student: ann.studentName || 'Anonymous',
        tags: (ann.tags || []).map(tid => tagMap[tid] || tid).join(', '),
        note: ann.note || '',
        time: ann.createdAt ? new Date(ann.createdAt).toISOString() : ''
      });
    });
  });
  const blob = new Blob(
    [JSON.stringify({ session: sessionMeta, annotations: rows }, null, 2)],
    { type: 'application/json' }
  );
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `close-reader-${SESSION_ID}.json`;
  a.click();
}

// ── Name dialog ───────────────────────────────────────────────────────────────
function submitName() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  setStudentName(val);
  document.getElementById('nameDialog').style.display = 'none';
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadSession();
</script>
